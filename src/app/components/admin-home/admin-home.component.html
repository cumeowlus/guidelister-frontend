<div class="container py-4">
  <h2 class="mb-4">Interface administrateur</h2>
  <div class="row">
    <div class="col-md-4">
      <div class="card mb-3" (click)="goToGuides()" style="cursor:pointer;">
        <div class="card-body">
          <h5 class="card-title">Gérer les guides</h5>
          <p class="card-text">Voir, modifier ou supprimer les guides.</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card mb-3" (click)="goToUsers()" style="cursor:pointer;">
        <div class="card-body">
          <h5 class="card-title">Gérer les utilisateurs</h5>
          <p class="card-text">Créer ou supprimer des comptes utilisateurs.</p>
        </div>
      </div>
    </div>
  </div>
</div>
