<div class="container py-3">
  <h2 class="mb-4">Ajouter un utilisateur</h2>

  <form #f="ngForm" (ngSubmit)="save(f)" novalidate>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input id="email" name="email" type="email" class="form-control" placeholder="example@domaine.com" required
        [(ngModel)]="user.email" #email="ngModel" />
      <div *ngIf="email.invalid && email.touched" class="form-text text-danger">
        Email invalide.
      </div>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Mot de passe</label>
      <input id="password" name="password" type="password" class="form-control" required [(ngModel)]="password"
        #pwd="ngModel" />
      <div *ngIf="pwd.invalid && pwd.touched" class="form-text text-danger">
        Le mot de passe est requis.
      </div>
    </div>

    <div class="form-check mb-3">
      <input id="isAdmin" name="isAdmin" class="form-check-input" type="checkbox" [(ngModel)]="user.isAdmin" />
      <label for="isAdmin" class="form-check-label">Compte administrateur</label>
    </div>

    <div class="mt-2">
      <button type="submit" class="btn btn-primary" [disabled]="f.invalid || submitting">Créer</button>
      <button type="button" class="btn btn-secondary" (click)="goToAdminUsersInterface()">Annuler</button>
    </div>
  </form>
</div>
