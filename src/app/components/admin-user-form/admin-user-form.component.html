<div class="container py-3">
  <h2 class="mb-4">Ajouter un utilisateur</h2>

  <form [(ngModel)]="form" (ngSubmit)="save()" novalidate>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input id="email" type="email" class="form-control" formControlName="email" placeholder="example@domaine.com" />
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Mot de passe</label>
      <input id="password" type="password" class="form-control" formControlName="password" />
    </div>

    <div class="form-check mb-3">
      <input id="isAdmin" class="form-check-input" type="checkbox" formControlName="isAdmin" />
      <label for="isAdmin" class="form-check-label">Compte administrateur</label>
    </div>

    <div class="mt-2">
      <button type="submit" class="btn btn-primary">Créer</button>
      <button class="btn btn-secondary" (click)="goToAdminUsersInterface()">Annuler</button>
    </div>
  </form>
</div>
