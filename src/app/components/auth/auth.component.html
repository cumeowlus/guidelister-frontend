<div class="container">
  <h2>Connexion / Créer un compte</h2>
  <div>
    <label>Email</label>
    <input type="email" [(ngModel)]="email" class="form-control" />
  </div>
  <div>
    <label>Mot de passe</label>
    <input type="password" [(ngModel)]="password" class="form-control" />
  </div>
  <div class="mt-2">
    <button class="btn btn-primary" (click)="login()">Se connecter</button>
    <button class="btn btn-secondary" (click)="register()">Créer un compte</button>
  </div>
  <div *ngIf="error" class="text-danger mt-2">{{ error }}</div>
</div>
