<div class="container py-3">
  <h2 class="mb-4">{{ isEdit ? 'Modifier le guide' : 'Ajouter un guide' }}</h2>

  <form #f="ngForm" (ngSubmit)="save(f)" novalidate>
    <div class="mb-3">
      <label class="form-label" for="titre">Titre</label>
      <input id="titre" name="titre" class="form-control" required [(ngModel)]="guide.titre" #titre="ngModel" />
      <div *ngIf="titre.invalid && titre.touched" class="form-text text-danger">
        Le titre est requis.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label" for="description">Description</label>
      <textarea id="description" name="description" class="form-control" [(ngModel)]="guide.description"></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label" for="mobilite">Mobilité</label>
      <input id="mobilite" name="mobilite" class="form-control" [(ngModel)]="guide.mobilite" />
    </div>

    <div class="mb-3">
      <label class="form-label" for="nbJour">Nombre de jours</label>
      <input id="nbJour" name="nbJour" type="number" min="1" class="form-control" required [(ngModel)]="guide.nbJour"
        #nbJour="ngModel" />
      <div *ngIf="nbJour.invalid && nbJour.touched" class="form-text text-danger">
        Indiquez un nombre de jours valide.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label" for="publicCible">Public cible</label>
      <input id="publicCible" name="publicCible" class="form-control" [(ngModel)]="guide.publicCible" />
    </div>

    <div class="mb-3">
      <label class="form-label" for="saison">Saison</label>
      <input id="saison" name="saison" class="form-control" [(ngModel)]="guide.saison" />
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="f.invalid || submitting">
        {{ isEdit ? 'Enregistrer' : 'Créer' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
    </div>
  </form>
</div>
