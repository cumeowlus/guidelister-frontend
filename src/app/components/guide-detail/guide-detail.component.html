<div class="container" *ngIf="!loading">

  <i class="bi bi-arrow-left" (click)="navBack()"></i>

  <div *ngIf="error" class="text-danger">{{ error }}</div>
  <div *ngIf="guide as g">
    <h2>{{ g.titre }}</h2>
    <p>{{ g.description }}</p>
    <p><strong>Durée:</strong> {{ g.nbJour }} jours</p>
    <p><strong>Mobilité:</strong> {{ g.mobilite }}</p>
    <h4>Activités</h4>
    <ul class="list-group">
      <li class="list-group-item" *ngFor="let a of g.activites">
        <h5>{{ a.titre }}</h5>
        <p>{{ a.description }}</p>
        <p><small>{{ a.horaires }} — {{ a.adresse }}</small></p>
      </li>
    </ul>
  </div>
</div>
<div *ngIf="loading" class="container">
  <p>Chargement...</p>
</div>
