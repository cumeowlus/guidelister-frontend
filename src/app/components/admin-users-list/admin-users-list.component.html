<div class="container py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Gérer les utilisateurs</h2>
    <button class="btn btn-primary" (click)="addUser()">Ajouter un utilisateur</button>
  </div>

  <div *ngIf="loading">Chargement...</div>
  <div *ngIf="error" class="text-danger">{{ error }}</div>

  <table *ngIf="!loading && users.length" class="table table-striped">
    <thead>
      <tr>
        <th>Email</th>
        <th>Admin</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of users">
        <td>{{ u.email }}</td>
        <td>{{ u.isAdmin ? 'Oui' : 'Non' }}</td>
        <td>
          <button class="btn btn-sm btn-danger" (click)="deleteUser(u)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && users.length === 0">Aucun utilisateur.</div>
</div>
