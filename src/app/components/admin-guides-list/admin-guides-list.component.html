<div class="container py-3">

  <button class="btn btn-outline-primary btn-sm backButton" (click)="navBack()">
    <i class="bi bi-arrow-left"></i>
  </button>


  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Gérer les guides</h2>
    <div>
      <button class="btn btn-primary me-2" (click)="addGuide()">Ajouter un guide</button>
    </div>
  </div>

  <div class="mb-3">
    <input class="form-control" placeholder="Rechercher un guide..." [(ngModel)]="filter" (input)="applyFilter()" />
  </div>

  <ul class="list-group">
    <li *ngFor="let guide of filtered" class="list-group-item list-group-item-action" (click)="openGuide(guide)">
      <div class="d-flex justify-content-between">
        <div>
          <strong>{{ guide.titre}}</strong>
          <div class="text-muted">{{ guide.description}}</div>
        </div>
        <div class="text-end">
          <small class="text-muted">#{{ guide.id }}</small>
        </div>
      </div>
    </li>
  </ul>

  <div *ngIf="!loading && filtered.length === 0" class="mt-3">Aucun guide trouvé.</div>
</div>
